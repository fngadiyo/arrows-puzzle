<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arrows</title>
    <style>
        body { 
            margin: 0; 
            background: #0f172a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; 
            color: #f8fafc;
        }
        canvas { 
            background: #1e293b; 
            border: 1px solid #334155; 
            cursor: crosshair; 
            touch-action: none; 
            image-rendering: pixelated; 
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .ui { margin-bottom: 20px; }
        button { 
            padding: 10px 24px; 
            font-weight: bold; 
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer; 
            background: #f59e0b; 
            color: #0f172a; 
            border: none; 
            border-radius: 6px; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        button:hover {
            background: #fbbf24;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="ui">
        <button onclick="initGame()">NEW PUZZLE</button>
        <select id="shapeSelector" onchange="onShapeChange()">
            <option value="square">SQUARE</option>
            <option value="circle">CIRCLE</option>
            <option value="❤️">HEART</option>
            <option value="🐘">ELEPHANT</option>
            <option value="🐦">BIRD</option>
            <option value="🐟">FISH</option>
            <option value="👻">GHOST</option>
            <option value="🌲">TREE</option>
            <option value="🚀">ROCKET</option>
        </select>
    </div>
    <div id="loadingOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100;">
        <div style="font-size:24px; font-weight:900; color:#f59e0b; margin-bottom:12px; letter-spacing:0.1em;">GENERATING...</div>
        <div id="progressText" style="font-size:14px; color:#94a3b8; font-family:monospace;">Wait a moment</div>
        <div style="margin-top:20px; width:200px; height:2px; background:#1e293b; border-radius:1px; overflow:hidden;">
            <div id="progressBar" style="width:0%; height:100%; background:#f59e0b; transition: width 0.3s ease;"></div>
        </div>
    </div>
    <canvas id="mazeCanvas"></canvas>

<script>
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    const cellSize = 24; 
    const cols = 25; 
    const rows = 25;
    
    canvas.width = cols * cellSize;
    canvas.height = rows * cellSize;

    let segments = [];
    let isWin = false;
    let shapeMode = 'circle'; 
    let maskGrid = new Uint8Array(cols * rows).fill(1);

    function onShapeChange() {
        shapeMode = document.getElementById('shapeSelector').value;
        buildShapeMask();
        initGame();
        preRenderDots(); 
    }

    function buildShapeMask() {
        if (shapeMode === 'square') {
            maskGrid.fill(1);
            return;
        }
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = cols;
        tempCanvas.height = rows;
        const tctx = tempCanvas.getContext('2d');
        tctx.fillStyle = "black";
        tctx.fillRect(0, 0, cols, rows);
        tctx.fillStyle = "white";
        
        if (shapeMode === 'circle') {
            tctx.beginPath();
            tctx.arc(cols/2, rows/2, cols/2, 0, Math.PI * 2);
            tctx.fill();
        } else {
            tctx.font = `${cols}px serif`;
            tctx.textAlign = "center";
            tctx.textBaseline = "middle";
            tctx.fillText(shapeMode, cols/2, rows/2 + 2); // Small offset for emoji centering
        }
        
        const imgData = tctx.getImageData(0, 0, cols, rows).data;
        
        let minX = cols, maxX = 0, minY = rows, maxY = 0;
        let foundAny = false;
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (imgData[(y * cols + x) * 4] > 128) {
                    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                    foundAny = true;
                }
            }
        }

        if (foundAny) {
            const shapeW = maxX - minX + 1;
            const shapeH = maxY - minY + 1;
            const offX = Math.floor((cols - shapeW) / 2) - minX;
            const offY = Math.floor((rows - shapeH) / 2) - minY;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const srcX = x - offX;
                    const srcY = y - offY;
                    if (srcX >= 0 && srcX < cols && srcY >= 0 && srcY < rows) {
                        maskGrid[y * cols + x] = imgData[(srcY * cols + srcX) * 4] > 128 ? 1 : 0;
                    } else {
                        maskGrid[y * cols + x] = 0;
                    }
                }
            }
        }
    }

    function isInside(x, y) {
        if (x < 0 || x >= cols || y < 0 || y >= rows) return false;
        return maskGrid[y * cols + x] === 1;
    }

    class Snake {
        constructor(points, forcedDirIndex = null) {
            this.points = points;
            this.startPoints = null; 
            this.updateDirection();
            if (forcedDirIndex !== null) { if (this.getDirKey() !== forcedDirIndex) this.flip(); }

            this.isMoving = false;
            this.isRetracting = false;
            this.moveProgress = 0;
            this.speed = 0.85; 
            this.color = "#f8fafc";
        }
        getDirKey() {
            if (this.dir.x > 0) return 0; if (this.dir.y > 0) return 1;
            if (this.dir.x < 0) return 2; if (this.dir.y < 0) return 3;
            return 0;
        }
        updateDirection() {
            if (this.points.length < 2) return;
            this.dir = { x: this.points[0].x - this.points[1].x, y: this.points[0].y - this.points[1].y };
        }
        flip() { this.points.reverse(); this.updateDirection(); }
        draw() {
            ctx.strokeStyle = this.color; ctx.lineWidth = 1.2; ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath();
            const offset = this.moveProgress;
            for (let i = 0; i < this.points.length; i++) {
                const pt = this.points[i];
                let px = pt.x + (i === 0 ? this.dir.x * offset : (this.points[i-1].x - pt.x) * offset);
                let py = pt.y + (i === 0 ? this.dir.y * offset : (this.points[i-1].y - pt.y) * offset);
                if (i > 0 && i < this.points.length - 1) {
                    const prev = this.points[i-1], next = this.points[i+1];
                    if (!((prev.y === pt.y && next.y === pt.y) || (prev.x === pt.x && next.x === pt.x))) { px = pt.x; py = pt.y; }
                }
                const sx = px * cellSize + cellSize/2, sy = py * cellSize + cellSize/2;
                if (i === 0) { ctx.moveTo(sx, sy); this.drawHead(sx, sy); }
                else { ctx.lineTo(sx, sy); }
            }
            ctx.stroke();
        }
        drawHead(x, y) {
            const angle = Math.atan2(this.dir.y, this.dir.x);
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
            ctx.beginPath(); ctx.moveTo(5.5, 0); ctx.lineTo(-5.5, -4); ctx.lineTo(-5.5, 4);
            ctx.closePath(); ctx.fillStyle = this.color; ctx.fill();
            ctx.restore();
        }
        update() {
            if (this.isRetracting) {
                this.moveProgress -= this.speed * 1.5;
                if (this.moveProgress <= 0) {
                    this.moveProgress = 0; this.isRetracting = false; this.color = "#f8fafc";
                    if (this.startPoints) { this.points = JSON.parse(JSON.stringify(this.startPoints)); this.startPoints = null; this.updateDirection(); }
                }
                return;
            }
            if (!this.isMoving) return;
            this.moveProgress += this.speed;
            if (this.moveProgress >= 1) {
                const nx = this.points[0].x + this.dir.x, ny = this.points[0].y + this.dir.y;
                let hit = false;
                if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                    for (let s of segments) { 
                        if (s === this) continue;
                        for (let p of s.points) if (p.x === nx && p.y === ny) hit = true; 
                    }
                }
                if (hit) { this.isMoving = false; this.isRetracting = true; this.color = "#cc8800"; return; }
                this.moveProgress = 0; this.points.unshift({ x: nx, y: ny }); this.points.pop(); this.updateDirection();
                if (this.points.every(p => p.x < 0 || p.x >= cols || p.y < 0 || p.y >= rows)) {
                    segments = segments.filter(s => s !== this);
                    if (segments.length === 0) isWin = true;
                }
            }
        }
    }

    function generateAsync(onComplete) {
        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('progressText').innerText = `Structuring perfect logic...`;

        setTimeout(() => {
            let bestLocal = [];
            let bestDensity = 0;
            
            let totalActiveMask = 0;
            for (let m of maskGrid) if (m === 1) totalActiveMask++;

            // Run more attempts to find 90%+ density configuration
            for (let attempt = 0; attempt < 150; attempt++) {
                const grid = Array.from({ length: rows }, () => new Uint8Array(cols).fill(1));
                
                function carve(x, y) {
                    grid[y][x] = 0;
                    const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]].sort(() => Math.random() - 0.5);
                    for (let [dx, dy] of dirs) {
                        const nx = x + dx, ny = y + dy;
                        if (isInside(nx, ny) && grid[ny][nx] === 1) {
                            const centerX = (cols - 1) / 2;
                            const isEdge = !isInside(nx + dx, ny + dy);
                            if (isEdge && Math.random() < 0.85) continue;
                            carve(nx, ny);
                        }
                    }
                }
                
                for(let i=0; i<30; i++) {
                    let rx = Math.floor(Math.random() * cols);
                    let ry = Math.floor(Math.random() * rows);
                    if (isInside(rx, ry)) carve(rx, ry);
                }

                let tempGrid = grid.map(r => [...r]);
                let paths = [];
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        if (isInside(x, y) && tempGrid[y][x] === 0) {
                            let path = [];
                            let limit = 4 + Math.floor(Math.random() * 7); // 4-10 cells for 25x25
                            trace(x, y, tempGrid, path, limit);
                            if (path.length > 2) {
                                paths.push(path);
                            }
                        }
                    }
                }

                // Sort by distance to actual mask center
                let midX = 0, midY = 0, mCount = 0;
                for(let i=0; i<cols*rows; i++) if(maskGrid[i]) { midX += i%cols; midY += Math.floor(i/cols); mCount++; }
                const mx = midX / mCount, my = midY / mCount;

                paths.forEach(p => {
                    let sumX = 0, sumY = 0;
                    for (let pt of p) { sumX += pt.x; sumY += pt.y; }
                    const cx = sumX / p.length, cy = sumY / p.length;
                    const distToCenter = (cx - mx)**2 + (cy - my)**2;
                    p.sortKey = distToCenter + Math.random() * 20; 
                });
                paths.sort((a, b) => a.sortKey - b.sortKey);

                let local = [];
                let occupiedGrid = new Int16Array(cols * rows).fill(-1);

                function isSelfBlocking(path, dx, dy) {
                    const head = path[0];
                    for (let step = 1; step < cols + rows; step++) {
                        const cx = head.x + dx * step, cy = head.y + dy * step;
                        if (!isInside(cx, cy)) break;
                        for (let i = 1; i < path.length; i++) {
                            if (path[i].x === cx && path[i].y === cy) return true;
                        }
                    }
                    return false;
                }

                function checkConsecutiveLimit(head, dx, dy, maxLimit) {
                    let queueSnakes = new Set();
                    queueSnakes.add(-1); 

                    // Scan FORWARDS
                    for (let step = 1; step < cols + rows; step++) {
                        const cx = head.x + dx * step, cy = head.y + dy * step;
                        if (!isInside(cx, cy)) break;
                        const id = occupiedGrid[cy * cols + cx];
                        if (id !== -1) {
                            if (local[id].dir.x === dx && local[id].dir.y === dy) queueSnakes.add(id);
                            else break;
                        }
                    }

                    // Scan BACKWARDS
                    for (let step = 1; step < cols + rows; step++) {
                        const cx = head.x - dx * step, cy = head.y - dy * step;
                        if (!isInside(cx, cy)) break;
                        const id = occupiedGrid[cy * cols + cx];
                        if (id !== -1) {
                            if (local[id].dir.x === dx && local[id].dir.y === dy) queueSnakes.add(id);
                            else break;
                        }
                    }
                    return queueSnakes.size <= maxLimit;
                }

                function checkDirectionalClump(head, dx, dy, radius, maxLimit) {
                    let count = 0;
                    for (let s of local) {
                        if (s.dir.x === dx && s.dir.y === dy) {
                            const dist = Math.hypot(s.points[0].x - head.x, s.points[0].y - head.y);
                            if (dist <= radius) {
                                count++;
                                if (count >= maxLimit) return false;
                            }
                        }
                    }
                    return true;
                }

                function tryPlace(path, reverse) {
                    let testPath = path.map(p => ({x: p.x, y: p.y}));
                    if (reverse) testPath.reverse();
                    
                    const head = testPath[0], neck = testPath[1];
                    const dx = Math.sign(head.x - neck.x), dy = Math.sign(head.y - neck.y);
                    
                    if (dx !== 0 && dy !== 0) return false;
                    if (dx === 0 && dy === 0) return false;

                    if (isSelfBlocking(testPath, dx, dy)) return false;
                    if (!checkConsecutiveLimit(head, dx, dy, 2)) return false;
                    // Relax radius to 3 to allow tighter packing in custom silhouettes
                    if (!checkDirectionalClump(head, dx, dy, 3, 2)) return false;

                    // Ensure exit ray is clear of ALL arrows we've already placed
                    for (let step = 1; step < cols + rows; step++) {
                        const cx = head.x + dx * step, cy = head.y + dy * step;
                        if (!isInside(cx, cy)) break;
                        if (occupiedGrid[cy * cols + cx] !== -1) return false;
                    }
                    
                    let sn = new Snake(testPath);
                    // Override direction to match test array precisely 
                    sn.dir = {x: dx, y: dy};
                    local.push(sn);
                    let id = local.length - 1;
                    
                    // Mark body so future arrows can avoid it
                    for (let p of testPath) {
                        occupiedGrid[p.y * cols + p.x] = id;
                    }
                    return true;
                }

                for (let p of paths) {
                    if (Math.random() > 0.5) {
                        if (!tryPlace(p, false)) tryPlace(p, true);
                    } else {
                        if (!tryPlace(p, true)) tryPlace(p, false);
                    }
                }
                
                // --- POCKET FILLER ALGORITHM ---
                // Maximize density by filling remaining free spaces that have a valid escape ray
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        if (isInside(x, y) && occupiedGrid[y * cols + x] === -1) {
                            const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]].sort(() => Math.random() - 0.5);
                            for (let [dx, dy] of dirs) {
                                let clear = true;
                                for (let step = 1; step < cols + rows; step++) {
                                    const cx = x + dx * step, cy = y + dy * step;
                                    if (!isInside(cx, cy)) break;
                                    if (occupiedGrid[cy * cols + cx] !== -1) { clear = false; break; }
                                }
                                
                                if (clear) {
                                    if (!checkConsecutiveLimit({x, y}, dx, dy, 2)) continue;
                                    if (!checkDirectionalClump({x, y}, dx, dy, 3, 1)) continue; // Stricter Limit (max 1 identical) for fillers locally!

                                    let path = [{x, y}];
                                    // Try to extend it opposite to exit direction for 1-3 cells
                                    let tx = x, ty = y;
                                    // We force at least 1 extension attempt to ensure length >= 2
                                    let targetExtra = 1 + Math.floor(Math.random() * 3);
                                    for(let l = 0; l < targetExtra; l++) {
                                        tx -= dx; ty -= dy;
                                        if (isInside(tx, ty) && occupiedGrid[ty * cols + tx] === -1) {
                                            path.push({x: tx, y: ty});
                                        } else break;
                                    }
                                    
                                    // Strictly enforce no 1-dot arrows
                                    if (path.length >= 2) {
                                        for (let p of path) {
                                            occupiedGrid[p.y * cols + p.x] = local.length;
                                        }
                                        let sn = new Snake(path);
                                        sn.dir = {x: dx, y: dy};
                                        local.push(sn);
                                        break;
                                    }
                                }
                            }
                        }
                    }
                }

                let filledCells = 0;
                for (let cell of occupiedGrid) {
                    if (cell !== -1) filledCells++;
                }

                if (filledCells > bestDensity) {
                    bestDensity = filledCells;
                    bestLocal = local;
                }
            }

            document.getElementById('loadingOverlay').style.display = 'none';
            onComplete(bestLocal);
            
        }, 50);
    }

    function trace(x, y, temp, path, limit) {
        temp[y][x] = 1; path.push({x, y});
        if (path.length >= limit) return;
        const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]].sort(() => Math.random() - 0.5);
        for (let [dx, dy] of dirs) {
            const nx = x + dx, ny = y + dy;
            if (isInside(nx, ny) && temp[ny][nx] === 0) { 
                trace(nx, ny, temp, path, limit); 
                return; 
            }
        }
    }

    let dotsCanvas = null;
    function preRenderDots() {
        if (!dotsCanvas) dotsCanvas = document.createElement('canvas');
        dotsCanvas.width = canvas.width; dotsCanvas.height = canvas.height;
        const dctx = dotsCanvas.getContext('2d');
        dctx.fillStyle = "rgba(245, 158, 11, 0.35)"; 
        for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
            if (isInside(c, r)) {
                dctx.beginPath(); dctx.arc(c * cellSize + cellSize/2, r * cellSize + cellSize/2, 1, 0, Math.PI * 2); dctx.fill();
            }
        }
    }
    preRenderDots(); // Initialize immediately on startup



    function initGame() { 
        isWin = false; 
        generateAsync(newSegments => {
            if (newSegments && newSegments.length > 0) segments = newSegments;
        });
    }

    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) / (rect.width / cols), my = (e.clientY - rect.top) / (rect.height / rows);
        let found = null, bestDist = 0.8; 
        for(let s of segments) {
            if (s.isMoving || s.isRetracting) continue;
            const dist = Math.hypot(mx - (s.points[0].x + 0.5), my - (s.points[0].y + 0.5));
            if (dist < bestDist) { bestDist = dist; found = s; }
        }
        if (found) { found.startPoints = JSON.parse(JSON.stringify(found.points)); found.isMoving = true; }
    });

    function loop() {
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Build Clipping Path from mask
        ctx.save();
        if (shapeMode !== 'square') {
            ctx.beginPath();
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    if (isInside(x, y)) {
                        ctx.rect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
            ctx.clip();
            
            // Sphere Shadow Depth (even for custom shapes)
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;
            const grad = ctx.createRadialGradient(centerX - radius*0.3, centerY - radius*0.3, radius*0.1, centerX, centerY, radius);
            grad.addColorStop(0, '#1e293b');
            grad.addColorStop(1, '#0f172a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        if (dotsCanvas) ctx.drawImage(dotsCanvas, 0, 0);
        segments.forEach(s => { s.update(); s.draw(); });
        
        ctx.restore();
        
        if (isWin) { 
            ctx.fillStyle = "#f59e0b"; ctx.font = "900 36px sans-serif"; 
            ctx.textAlign = "center"; 
            ctx.shadowBlur = 15; ctx.shadowColor = "rgba(245, 158, 11, 0.5)";
            ctx.fillText("YOU WIN!", canvas.width/2, canvas.height/2); 
            ctx.shadowBlur = 0;
        }
        requestAnimationFrame(loop);
    }

    buildShapeMask(); // Initial mask load
    initGame();
    loop();
</script>
</body>
</html>
