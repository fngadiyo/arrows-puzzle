<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arrows</title>
    <style>
        :root {
            --bg: #0f172a;
            --bg2: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #f59e0b;
            --accent2: #fbbf24;
        }
        [data-theme="light"] {
            --bg: #f1f5f9;
            --bg2: #e2e8f0;
            --border: #cbd5e1;
            --text: #0f172a;
            --muted: #475569;
            --accent: #d97706;
            --accent2: #f59e0b;
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; 
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
        canvas { 
            background: var(--bg2); 
            border: 1px solid var(--border); 
            cursor: crosshair; 
            touch-action: none; 
            image-rendering: pixelated; 
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .ui { 
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        button, select { 
            padding: 10px 18px; 
            font-weight: bold; 
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer; 
            background: var(--accent); 
            color: var(--bg); 
            border: none; 
            border-radius: 6px; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            font-family: inherit;
            outline: none;
        }
        button:hover, select:hover {
            background: var(--accent2);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        button:active, select:active {
            transform: translateY(0);
        }
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .overlay-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--accent);
            margin-bottom: 12px;
            letter-spacing: 0.1em;
        }
        .overlay-text {
            font-size: 14px;
            color: var(--muted);
            font-family: monospace;
        }
        .overlay-bar-bg {
            margin-top: 20px;
            width: 200px;
            height: 2px;
            background: var(--bg2);
            border-radius: 1px;
            overflow: hidden;
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="ui">
        <button onclick="initGame()">NEW PUZZLE</button>
        <select id="shapeSelector" onchange="onShapeChange()">
            <option value="square">SQUARE</option>
            <option value="circle">CIRCLE</option>
            <option value="❤️">HEART</option>
            <option value="🐘">ELEPHANT</option>
            <option value="🐦">BIRD</option>
            <option value="🐟">FISH</option>
            <option value="👻">GHOST</option>
            <option value="🌲">TREE</option>
            <option value="🚀">ROCKET</option>
        </select>
        <button id="themeBtn" onclick="cycleTheme()" title="Toggle theme" aria-label="Toggle theme" aria-live="polite">AUTO</button>
    </div>
    <div id="loadingOverlay">
        <div class="overlay-title">GENERATING...</div>
        <div id="progressText" class="overlay-text">Wait a moment</div>
        <div class="overlay-bar-bg">
            <div id="progressBar"></div>
        </div>
    </div>
    <canvas id="mazeCanvas"></canvas>

<script>
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    const cellSize = 24; 
    const cols = 25; 
    const rows = 25;
    
    canvas.width = cols * cellSize;
    canvas.height = rows * cellSize;

    // --- THEME ---
    const DARK_COLORS = {
        bg: '#0f172a', canvasBg: '#1e293b', arrow: '#f8fafc',
        arrowHit: '#cc8800', dot: 'rgba(245,158,11,0.35)', win: '#f59e0b',
        gradInner: '#1e293b', gradOuter: '#0f172a', overlayBg: 'rgba(15,23,42,0.85)'
    };
    const LIGHT_COLORS = {
        bg: '#f1f5f9', canvasBg: '#e2e8f0', arrow: '#334155',
        arrowHit: '#b45309', dot: 'rgba(180,83,9,0.3)', win: '#d97706',
        gradInner: '#e2e8f0', gradOuter: '#f1f5f9', overlayBg: 'rgba(241,245,249,0.9)'
    };
    let C = DARK_COLORS;
    let currentTheme = 'system';

    function applyTheme(theme) {
        currentTheme = theme;
        const resolved = theme === 'system'
            ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
            : theme;
        document.documentElement.setAttribute('data-theme', resolved);
        C = resolved === 'light' ? LIGHT_COLORS : DARK_COLORS;
        document.getElementById('loadingOverlay').style.background = C.overlayBg;
        for (const s of segments) { if (!s.isRetracting) s.color = C.arrow; }
        preRenderDots();
        const icons = { system: 'AUTO', light: '☀', dark: '🌙' };
        document.getElementById('themeBtn').textContent = icons[theme];
    }

    function cycleTheme() {
        const order = ['system', 'light', 'dark'];
        currentTheme = order[(order.indexOf(currentTheme) + 1) % order.length];
        localStorage.setItem('arrowsTheme', currentTheme);
        applyTheme(currentTheme);
    }

    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
        if (currentTheme === 'system') applyTheme('system');
    });

    let segments = [];
    let isWin = false;
    let shapeMode = 'circle'; 
    let maskGrid = new Uint8Array(cols * rows).fill(1);

    function onShapeChange() {
        shapeMode = document.getElementById('shapeSelector').value;
        buildShapeMask();
        applyTheme(currentTheme);
        initGame();
    }

    function buildShapeMask() {
        if (shapeMode === 'square') {
            maskGrid.fill(1);
            return;
        }
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = cols;
        tempCanvas.height = rows;
        const tctx = tempCanvas.getContext('2d');
        tctx.fillStyle = "black";
        tctx.fillRect(0, 0, cols, rows);
        tctx.fillStyle = "white";
        
        if (shapeMode === 'circle') {
            tctx.beginPath();
            tctx.arc(cols/2, rows/2, cols/2, 0, Math.PI * 2);
            tctx.fill();
        } else {
            tctx.font = `${cols}px serif`;
            tctx.textAlign = "center";
            tctx.textBaseline = "middle";
            tctx.fillText(shapeMode, cols/2, rows/2 + 2); // Small offset for emoji centering
        }
        
        const imgData = tctx.getImageData(0, 0, cols, rows).data;
        
        let minX = cols, maxX = 0, minY = rows, maxY = 0;
        let foundAny = false;
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (imgData[(y * cols + x) * 4] > 128) {
                    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                    foundAny = true;
                }
            }
        }

        if (foundAny) {
            const shapeW = maxX - minX + 1;
            const shapeH = maxY - minY + 1;
            const offX = Math.floor((cols - shapeW) / 2) - minX;
            const offY = Math.floor((rows - shapeH) / 2) - minY;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const srcX = x - offX;
                    const srcY = y - offY;
                    if (srcX >= 0 && srcX < cols && srcY >= 0 && srcY < rows) {
                        maskGrid[y * cols + x] = imgData[(srcY * cols + srcX) * 4] > 128 ? 1 : 0;
                    } else {
                        maskGrid[y * cols + x] = 0;
                    }
                }
            }
        }
    }

    function isInside(x, y) {
        if (x < 0 || x >= cols || y < 0 || y >= rows) return false;
        return maskGrid[y * cols + x] === 1;
    }

    class Snake {
        constructor(points, forcedDirIndex = null) {
            this.points = points;
            this.startPoints = null; 
            this.updateDirection();
            if (forcedDirIndex !== null) { if (this.getDirKey() !== forcedDirIndex) this.flip(); }

            this.isMoving = false;
            this.isRetracting = false;
            this.moveProgress = 0;
            this.speed = 0.85; 
            this.color = C.arrow;
        }
        getDirKey() {
            if (this.dir.x > 0) return 0; if (this.dir.y > 0) return 1;
            if (this.dir.x < 0) return 2; if (this.dir.y < 0) return 3;
            return 0;
        }
        updateDirection() {
            if (this.points.length < 2) return;
            this.dir = { x: this.points[0].x - this.points[1].x, y: this.points[0].y - this.points[1].y };
        }
        flip() { this.points.reverse(); this.updateDirection(); }
        draw() {
            ctx.strokeStyle = this.color; ctx.lineWidth = 1.2; ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath();
            const offset = this.moveProgress;
            for (let i = 0; i < this.points.length; i++) {
                const pt = this.points[i];
                let px = pt.x + (i === 0 ? this.dir.x * offset : (this.points[i-1].x - pt.x) * offset);
                let py = pt.y + (i === 0 ? this.dir.y * offset : (this.points[i-1].y - pt.y) * offset);
                if (i > 0 && i < this.points.length - 1) {
                    const prev = this.points[i-1], next = this.points[i+1];
                    if (!((prev.y === pt.y && next.y === pt.y) || (prev.x === pt.x && next.x === pt.x))) { px = pt.x; py = pt.y; }
                }
                const sx = px * cellSize + cellSize/2, sy = py * cellSize + cellSize/2;
                if (i === 0) { ctx.moveTo(sx, sy); this.drawHead(sx, sy); }
                else { ctx.lineTo(sx, sy); }
            }
            ctx.stroke();
        }
        drawHead(x, y) {
            const angle = Math.atan2(this.dir.y, this.dir.x);
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
            ctx.beginPath(); ctx.moveTo(5.5, 0); ctx.lineTo(-5.5, -4); ctx.lineTo(-5.5, 4);
            ctx.closePath(); ctx.fillStyle = this.color; ctx.fill();
            ctx.restore();
        }
        update() {
            if (this.isRetracting) {
                this.moveProgress -= this.speed * 1.5;
                if (this.moveProgress <= 0) {
                    this.moveProgress = 0; this.isRetracting = false; this.color = C.arrow;
                    if (this.startPoints) { this.points = JSON.parse(JSON.stringify(this.startPoints)); this.startPoints = null; this.updateDirection(); }
                }
                return;
            }
            if (!this.isMoving) return;
            this.moveProgress += this.speed;
            if (this.moveProgress >= 1) {
                const nx = this.points[0].x + this.dir.x, ny = this.points[0].y + this.dir.y;
                let hit = false;
                if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                    for (let s of segments) { 
                        if (s === this) continue;
                        for (let p of s.points) if (p.x === nx && p.y === ny) hit = true; 
                    }
                }
                if (hit) { this.isMoving = false; this.isRetracting = true; this.color = C.arrowHit; return; }
                this.moveProgress = 0; this.points.unshift({ x: nx, y: ny }); this.points.pop(); this.updateDirection();
                if (this.points.every(p => p.x < 0 || p.x >= cols || p.y < 0 || p.y >= rows)) {
                    segments = segments.filter(s => s !== this);
                    if (segments.length === 0) isWin = true;
                }
            }
        }
    }

    function generateAsync(onComplete) {
        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('progressText').innerText = 'Generating puzzle...';

        setTimeout(() => {
            let totalMask = 0;
            for (const m of maskGrid) if (m === 1) totalMask++;

            let bestArrows = [];
            let bestFilled = 0;

            const DIRS = [[1,0],[-1,0],[0,1],[0,-1]];
            const MAX_ARROW_LENGTH = 10;
            const MAX_GENERATION_ATTEMPTS = 35;
            const TARGET_DENSITY = 0.97;

            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // Pure reverse-generation: each arrow's exit ray is clear of all
            // previously placed arrows, so the puzzle is always solvable in
            // reverse placement order (last placed = first to escape).
            function generateOnce() {
                const occ = new Int16Array(cols * rows).fill(-1);
                const arrows = [];

                // Collect all mask cells in random order
                const cells = [];
                for (let y = 0; y < rows; y++)
                    for (let x = 0; x < cols; x++)
                        if (isInside(x, y)) cells.push([x, y]);
                shuffle(cells);

                function exitClear(hx, hy, dx, dy) {
                    for (let s = 1; s < cols + rows; s++) {
                        const cx = hx + dx * s, cy = hy + dy * s;
                        if (!isInside(cx, cy)) return true;
                        if (occ[cy * cols + cx] !== -1) return false;
                    }
                    return true;
                }

                for (const [x, y] of cells) {
                    if (occ[y * cols + x] !== -1) continue; // already a body cell

                    const dirs = shuffle([...DIRS]);
                    for (const [dx, dy] of dirs) {
                        if (!exitClear(x, y, dx, dy)) continue;

                        // Extend body backward as far as possible (max 10 cells)
                        const body = [{x, y}];
                        let bx = x - dx, by = y - dy;
                        while (isInside(bx, by) && occ[by * cols + bx] === -1 && body.length < MAX_ARROW_LENGTH) {
                            body.push({x: bx, y: by});
                            bx -= dx; by -= dy;
                        }
                        if (body.length < 2) continue;

                        const id = arrows.length;
                        for (const p of body) occ[p.y * cols + p.x] = id;
                        const sn = new Snake(body);
                        sn.dir = {x: dx, y: dy};
                        arrows.push(sn);
                        break;
                    }
                }

                let filled = 0;
                for (const v of occ) if (v !== -1) filled++;
                return { arrows, filled };
            }

            for (let attempt = 0; attempt < MAX_GENERATION_ATTEMPTS; attempt++) {
                const { arrows, filled } = generateOnce();
                if (filled > bestFilled) {
                    bestFilled = filled;
                    bestArrows = arrows;
                }
                if (bestFilled >= Math.floor(totalMask * TARGET_DENSITY)) break;
            }

            document.getElementById('loadingOverlay').style.display = 'none';
            onComplete(bestArrows);
        }, 50);
    }

    let dotsCanvas = null;
    function preRenderDots() {
        if (!dotsCanvas) dotsCanvas = document.createElement('canvas');
        dotsCanvas.width = canvas.width; dotsCanvas.height = canvas.height;
        const dctx = dotsCanvas.getContext('2d');
        dctx.clearRect(0, 0, dotsCanvas.width, dotsCanvas.height);
        dctx.fillStyle = C.dot;
        for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
            if (isInside(c, r)) {
                dctx.beginPath(); dctx.arc(c * cellSize + cellSize/2, r * cellSize + cellSize/2, 1, 0, Math.PI * 2); dctx.fill();
            }
        }
    }
    function initGame() { 
        isWin = false; 
        generateAsync(newSegments => {
            if (newSegments && newSegments.length > 0) segments = newSegments;
        });
    }

    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) / (rect.width / cols), my = (e.clientY - rect.top) / (rect.height / rows);
        let found = null, bestDist = 0.8; 
        for(let s of segments) {
            if (s.isMoving || s.isRetracting) continue;
            const dist = Math.hypot(mx - (s.points[0].x + 0.5), my - (s.points[0].y + 0.5));
            if (dist < bestDist) { bestDist = dist; found = s; }
        }
        if (found) { found.startPoints = JSON.parse(JSON.stringify(found.points)); found.isMoving = true; }
    });

    function loop() {
        ctx.fillStyle = C.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Build Clipping Path from mask
        ctx.save();
        if (shapeMode !== 'square') {
            ctx.beginPath();
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    if (isInside(x, y)) {
                        ctx.rect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
            ctx.clip();
            
            // Sphere Shadow Depth (even for custom shapes)
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;
            const grad = ctx.createRadialGradient(centerX - radius*0.3, centerY - radius*0.3, radius*0.1, centerX, centerY, radius);
            grad.addColorStop(0, C.gradInner);
            grad.addColorStop(1, C.gradOuter);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        if (dotsCanvas) ctx.drawImage(dotsCanvas, 0, 0);
        segments.forEach(s => { s.update(); s.draw(); });
        
        ctx.restore();
        
        if (isWin) { 
            ctx.fillStyle = C.win; ctx.font = "900 36px sans-serif"; 
            ctx.textAlign = "center"; 
            ctx.shadowBlur = 15; ctx.shadowColor = "rgba(245, 158, 11, 0.5)";
            ctx.fillText("YOU WIN!", canvas.width/2, canvas.height/2); 
            ctx.shadowBlur = 0;
        }
        requestAnimationFrame(loop);
    }

    buildShapeMask(); // Initial mask load
    applyTheme(localStorage.getItem('arrowsTheme') || 'system');
    initGame();
    loop();
</script>
</body>
</html>
