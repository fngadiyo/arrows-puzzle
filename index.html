<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arrows</title>
    <style>
        :root {
            --bg: #f8fafc;
            --text: #0f172a;
            --panel-bg: #ffffff;
            --panel-border: #e2e8f0;
            --muted: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-contrast: #ffffff;
            --overlay: rgba(248, 250, 252, 0.82);
            --control-bg: #ffffff;
            --control-border: #dbe4f0;
            --shadow: rgba(15, 23, 42, 0.10);
        }
        html[data-theme="light"] {
            --bg: #f8fafc;
            --text: #0f172a;
            --panel-bg: #ffffff;
            --panel-border: #e2e8f0;
            --muted: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-contrast: #ffffff;
            --overlay: rgba(248, 250, 252, 0.82);
            --control-bg: #ffffff;
            --control-border: #dbe4f0;
            --shadow: rgba(15, 23, 42, 0.10);
        }
        html[data-theme="dark"] {
            --bg: #0f172a;
            --text: #f8fafc;
            --panel-bg: #1e293b;
            --panel-border: #334155;
            --muted: #94a3b8;
            --accent: #f59e0b;
            --accent-hover: #fbbf24;
            --accent-contrast: #0f172a;
            --overlay: rgba(15, 23, 42, 0.8);
            --control-bg: #1e293b;
            --control-border: #334155;
            --shadow: rgba(0, 0, 0, 0.5);
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100dvh; 
            height: auto; 
            padding: 12px; 
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; 
            overflow-y: auto; 
            color: var(--text);
            transition: background 0.2s ease, color 0.2s ease;
        }
        canvas { 
            background: transparent; 
            border: 0; 
            cursor: crosshair; 
            touch-action: none; 
            image-rendering: pixelated; 
            border-radius: 8px;
            box-shadow: none;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            width: min(100%, 100vw - 24px);
            max-width: 680px;
            height: auto;
            display: block;
        }
        .ui {
            margin-bottom: 16px;
            display: flex;
            align-items: stretch;
            flex-direction: column;
            gap: 10px;
        }
        button, select.control { 
            padding: 10px 24px; 
            font-weight: bold; 
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer; 
            border-radius: 16px; 
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        button {
            background: var(--accent); 
            color: var(--accent-contrast); 
            box-shadow: 0 8px 20px -10px rgba(79, 70, 229, 0.5);
        }
        select.control {
            background: var(--control-bg);
            color: var(--text);
            border-color: var(--control-border);
            padding-right: 36px;
            width: 100%;
        }
        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 12px 24px -12px rgba(79, 70, 229, 0.45);
        }
        select.control:hover {
            border-color: var(--accent);
        }
        button:active {
            transform: translateY(0);
        }
        #statsText {
            margin-left: 0;
            font-size: 12px;
            color: var(--muted);
            font-family: monospace;
            text-align: left;
        }
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .overlay-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--accent);
            margin-bottom: 12px;
            letter-spacing: 0.1em;
        }
        #progressText {
            font-size: 14px;
            color: var(--muted);
            font-family: monospace;
        }
        .progress-track {
            margin-top: 20px;
            width: 200px;
            height: 2px;
            background: var(--panel-bg);
            border-radius: 1px;
            overflow: hidden;
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        .screen {
            width: min(100%, 760px);
        }
        .hidden {
            display: none !important;
        }
        .card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 12px 30px -18px var(--shadow);
        }
        .title {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 0.06em;
            margin: 0 0 8px;
            text-transform: uppercase;
            color: var(--accent);
        }
        .subtitle {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 14px;
        }
        .hud {
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 6px;
            flex-direction: column;
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
        }
        .hud span {
            font-size: 12px;
            color: var(--muted);
            font-family: monospace;
        }
        #finalBreakdown {
            color: var(--muted);
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-line;
            margin: 10px 0 18px;
        }

        @media (min-width: 720px) {
            body {
                justify-content: center;
                padding: 20px;
            }
            .screen {
                width: min(92vw, 760px);
            }
            .card {
                padding: 22px;
            }
            .title {
                font-size: 34px;
            }
            .ui {
                align-items: center;
                flex-direction: row;
                flex-wrap: wrap;
            }
            button, select.control {
                width: auto;
            }
            #statsText {
                margin-left: 8px;
            }
            .hud {
                align-items: center;
                justify-content: space-between;
                flex-direction: row;
            }
            canvas {
                max-width: 680px;
            }
        }
    </style>
</head>
<body>
    <section id="startScreen" class="screen card">
        <h1 class="title">The Arrows</h1>
        <p class="subtitle">Choose your setup, then clear every arrow before time runs out.</p>
        <div class="ui">
            <select id="shapeSelector" class="control" onchange="onShapeChange()">
                <option value="square">SQUARE</option>
                <option value="circle" selected>CIRCLE</option>
                <option value="❤️">HEART</option>
                <option value="🐘">ELEPHANT</option>
                <option value="🐦">BIRD</option>
                <option value="🐟">FISH</option>
                <option value="👻">GHOST</option>
                <option value="🌲">TREE</option>
                <option value="🚀">ROCKET</option>
                <option value="⭐">STAR</option>
                <option value="🌙">MOON</option>
                <option value="🦋">BUTTERFLY</option>
                <option value="🐢">TURTLE</option>
                <option value="🐱">CAT</option>
                <option value="🐶">DOG</option>
                <option value="🐙">OCTOPUS</option>
                <option value="🧩">PUZZLE</option>
                <option value="🎈">BALLOON</option>
                <option value="🍎">APPLE</option>
            </select>
            <select id="themeSelector" class="control" onchange="onThemeChange()">
                <option value="system" selected>SYSTEM</option>
                <option value="light">LIGHT</option>
                <option value="dark">DARK</option>
            </select>
            <select id="modeSelector" class="control">
                <option value="casual" selected>CASUAL</option>
                <option value="competitive">COMPETITIVE</option>
            </select>
            <button onclick="startGame()">START GAME</button>
        </div>
    </section>

    <section id="gameScreen" class="screen hidden">
        <div class="hud">
            <span id="hudMode">mode: casual</span>
            <span id="hudTimer">time: --:--</span>
            <span id="statsText">solved: 0/0 | mistakes: 0</span>
        </div>
        <div class="ui" style="margin-top:0;">
            <button onclick="initGame()">NEW ROUND</button>
            <button onclick="showStartMenu()">MENU</button>
        </div>
        <canvas id="mazeCanvas"></canvas>
    </section>

    <section id="resultScreen" class="screen card hidden">
        <h2 id="finalTitle" class="title" style="font-size:28px; margin-bottom:6px;">Round Over</h2>
        <p id="finalReason" class="subtitle">Result details</p>
        <div id="finalScore" style="font-size:40px; font-weight:900; color:var(--accent); margin-bottom:8px;">0</div>
        <div id="finalBreakdown"></div>
        <div class="ui">
            <button onclick="startGame()">PLAY AGAIN</button>
            <button onclick="showStartMenu()">MAIN MENU</button>
        </div>
    </section>

    <div id="loadingOverlay">
        <div class="overlay-title">GENERATING...</div>
        <div id="progressText">Wait a moment</div>
        <div class="progress-track">
            <div id="progressBar"></div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    const cellSize = 24; 
    const cols = 25; 
    const rows = 25;
    
    canvas.width = cols * cellSize;
    canvas.height = rows * cellSize;

    let segments = [];
    let isWin = false;
    let shapeMode = 'circle'; 
    let maskGrid = new Uint8Array(cols * rows).fill(1);
    let themeMode = 'system';
    let gameMode = 'casual';
    let gameState = 'menu';
    let roundEnded = false;
    let roundStartMs = 0;
    let timeLeftSeconds = 150;
    let initialArrowCount = 0;
    let solvedCount = 0;
    let mistakes = 0;
    let clickCount = 0;
    let boardFillPct = '0.0';
    let boardMaxBlockers = 0;

    const COMPETITIVE_SECONDS = 150;

    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const resultScreen = document.getElementById('resultScreen');
    const statsText = document.getElementById('statsText');
    const hudMode = document.getElementById('hudMode');
    const hudTimer = document.getElementById('hudTimer');

    const themePalettes = {
        dark: {
            snake: '#f8fafc',
            blocked: '#cc8800',
            boardBg: '#0f172a',
            gradInner: '#1e293b',
            gradOuter: '#0f172a',
            dots: 'rgba(245, 158, 11, 0.35)',
            win: '#f59e0b',
            winGlow: 'rgba(245, 158, 11, 0.5)'
        },
        light: {
            snake: '#0f172a',
            blocked: '#b45309',
            boardBg: '#f1f5f9',
            gradInner: '#ffffff',
            gradOuter: '#e2e8f0',
            dots: 'rgba(180, 83, 9, 0.24)',
            win: '#d97706',
            winGlow: 'rgba(217, 119, 6, 0.35)'
        }
    };

    let activePalette = themePalettes.dark;

    function resolveSystemTheme() {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyThemeMode(mode) {
        themeMode = mode;
        const resolvedTheme = mode === 'system' ? resolveSystemTheme() : mode;
        document.documentElement.setAttribute('data-theme', resolvedTheme);
        activePalette = themePalettes[resolvedTheme];

        for (let segment of segments) {
            if (!segment.isRetracting) segment.color = activePalette.snake;
        }

        preRenderDots();
    }

    function onThemeChange() {
        const mode = document.getElementById('themeSelector').value;
        applyThemeMode(mode);
    }

    function formatTime(totalSeconds) {
        const seconds = Math.max(0, Math.floor(totalSeconds));
        const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
        const ss = String(seconds % 60).padStart(2, '0');
        return `${mm}:${ss}`;
    }

    function updateHud() {
        hudMode.textContent = `mode: ${gameMode}`;
        hudTimer.textContent = `time: ${gameMode === 'competitive' ? formatTime(timeLeftSeconds) : '--:--'}`;
        statsText.textContent = `solved: ${solvedCount}/${initialArrowCount} | mistakes: ${mistakes} | fill: ${boardFillPct}%`;
    }

    function showScreen(target) {
        startScreen.classList.add('hidden');
        gameScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
        target.classList.remove('hidden');
    }

    function showStartMenu() {
        gameState = 'menu';
        roundEnded = true;
        isWin = false;
        showScreen(startScreen);
    }

    function startGame() {
        gameMode = document.getElementById('modeSelector').value;
        showScreen(gameScreen);
        initGame();
    }

    const systemThemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
    if (typeof systemThemeQuery.addEventListener === 'function') {
        systemThemeQuery.addEventListener('change', () => {
            if (themeMode === 'system') applyThemeMode('system');
        });
    }

    function onShapeChange() {
        shapeMode = document.getElementById('shapeSelector').value;
        buildShapeMask();
        preRenderDots(); 
        if (gameState === 'ingame') initGame();
    }

    function buildShapeMask() {
        if (shapeMode === 'square') {
            maskGrid.fill(1);
            return;
        }
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = cols;
        tempCanvas.height = rows;
        const tctx = tempCanvas.getContext('2d');
        tctx.fillStyle = "black";
        tctx.fillRect(0, 0, cols, rows);
        tctx.fillStyle = "white";
        
        if (shapeMode === 'circle') {
            tctx.beginPath();
            tctx.arc(cols/2, rows/2, cols/2, 0, Math.PI * 2);
            tctx.fill();
        } else {
            tctx.font = `${cols}px serif`;
            tctx.textAlign = "center";
            tctx.textBaseline = "middle";
            tctx.fillText(shapeMode, cols/2, rows/2 + 2); // Small offset for emoji centering
        }
        
        const imgData = tctx.getImageData(0, 0, cols, rows).data;
        
        let minX = cols, maxX = 0, minY = rows, maxY = 0;
        let foundAny = false;
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (imgData[(y * cols + x) * 4] > 128) {
                    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                    foundAny = true;
                }
            }
        }

        if (foundAny) {
            const shapeW = maxX - minX + 1;
            const shapeH = maxY - minY + 1;
            const offX = Math.floor((cols - shapeW) / 2) - minX;
            const offY = Math.floor((rows - shapeH) / 2) - minY;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const srcX = x - offX;
                    const srcY = y - offY;
                    if (srcX >= 0 && srcX < cols && srcY >= 0 && srcY < rows) {
                        maskGrid[y * cols + x] = imgData[(srcY * cols + srcX) * 4] > 128 ? 1 : 0;
                    } else {
                        maskGrid[y * cols + x] = 0;
                    }
                }
            }
        }
    }

    function isInside(x, y) {
        if (x < 0 || x >= cols || y < 0 || y >= rows) return false;
        return maskGrid[y * cols + x] === 1;
    }

    class Snake {
        constructor(points, forcedDirIndex = null) {
            this.points = points;
            this.startPoints = null; 
            this.updateDirection();
            if (forcedDirIndex !== null) { if (this.getDirKey() !== forcedDirIndex) this.flip(); }

            this.isMoving = false;
            this.isRetracting = false;
            this.moveProgress = 0;
            this.speed = 0.85; 
            this.color = activePalette.snake;
        }
        getDirKey() {
            if (this.dir.x > 0) return 0; if (this.dir.y > 0) return 1;
            if (this.dir.x < 0) return 2; if (this.dir.y < 0) return 3;
            return 0;
        }
        updateDirection() {
            if (this.points.length < 2) return;
            this.dir = { x: this.points[0].x - this.points[1].x, y: this.points[0].y - this.points[1].y };
        }
        flip() { this.points.reverse(); this.updateDirection(); }
        draw() {
            ctx.strokeStyle = this.color; ctx.lineWidth = 3.0; ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath();
            const offset = this.moveProgress;
            for (let i = 0; i < this.points.length; i++) {
                const pt = this.points[i];
                let px = pt.x + (i === 0 ? this.dir.x * offset : (this.points[i-1].x - pt.x) * offset);
                let py = pt.y + (i === 0 ? this.dir.y * offset : (this.points[i-1].y - pt.y) * offset);
                if (i > 0 && i < this.points.length - 1) {
                    const prev = this.points[i-1], next = this.points[i+1];
                    if (!((prev.y === pt.y && next.y === pt.y) || (prev.x === pt.x && next.x === pt.x))) { px = pt.x; py = pt.y; }
                }
                const sx = px * cellSize + cellSize/2, sy = py * cellSize + cellSize/2;
                if (i === 0) { ctx.moveTo(sx, sy); this.drawHead(sx, sy); }
                else { ctx.lineTo(sx, sy); }
            }
            ctx.stroke();
        }
        drawHead(x, y) {
            const angle = Math.atan2(this.dir.y, this.dir.x);
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
            const vertices = [
                { x: 6.4, y: 0 },
                { x: -5.8, y: -4.2 },
                { x: -5.8, y: 4.2 }
            ];
            const cornerRadius = 1.1;

            const normalize = (dx, dy) => {
                const len = Math.hypot(dx, dy) || 1;
                return { x: dx / len, y: dy / len };
            };

            ctx.beginPath();
            for (let index = 0; index < vertices.length; index++) {
                const prev = vertices[(index - 1 + vertices.length) % vertices.length];
                const current = vertices[index];
                const next = vertices[(index + 1) % vertices.length];

                const toPrev = normalize(prev.x - current.x, prev.y - current.y);
                const toNext = normalize(next.x - current.x, next.y - current.y);

                const start = {
                    x: current.x + toPrev.x * cornerRadius,
                    y: current.y + toPrev.y * cornerRadius
                };
                const end = {
                    x: current.x + toNext.x * cornerRadius,
                    y: current.y + toNext.y * cornerRadius
                };

                if (index === 0) ctx.moveTo(start.x, start.y);
                else ctx.lineTo(start.x, start.y);

                ctx.quadraticCurveTo(current.x, current.y, end.x, end.y);
            }

            ctx.closePath();
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.restore();
        }
        update() {
            if (this.isRetracting) {
                this.moveProgress -= this.speed * 1.5;
                if (this.moveProgress <= 0) {
                    this.moveProgress = 0; this.isRetracting = false; this.color = activePalette.snake;
                    if (this.startPoints) { this.points = JSON.parse(JSON.stringify(this.startPoints)); this.startPoints = null; this.updateDirection(); }
                }
                return;
            }
            if (!this.isMoving) return;
            this.moveProgress += this.speed;
            if (this.moveProgress >= 1) {
                const nx = this.points[0].x + this.dir.x, ny = this.points[0].y + this.dir.y;
                let hit = false;
                if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                    for (let s of segments) { 
                        if (s === this) continue;
                        for (let p of s.points) if (p.x === nx && p.y === ny) hit = true; 
                    }
                }
                if (hit) {
                    this.isMoving = false;
                    this.isRetracting = true;
                    this.color = activePalette.blocked;
                    mistakes++;
                    updateHud();
                    return;
                }
                this.moveProgress = 0; this.points.unshift({ x: nx, y: ny }); this.points.pop(); this.updateDirection();
                if (this.points.every(p => p.x < 0 || p.x >= cols || p.y < 0 || p.y >= rows)) {
                    segments = segments.filter(s => s !== this);
                    solvedCount = initialArrowCount - segments.length;
                    updateHud();
                    if (segments.length === 0) {
                        isWin = true;
                        endRound('solved');
                    }
                }
            }
        }
    }

    function computeDependencies(snakes) {
        const occupancy = new Int16Array(cols * rows).fill(-1);
        for (let index = 0; index < snakes.length; index++) {
            for (let point of snakes[index].points) {
                if (isInside(point.x, point.y)) occupancy[point.y * cols + point.x] = index;
            }
        }

        const deps = Array.from({ length: snakes.length }, () => new Set());
        for (let index = 0; index < snakes.length; index++) {
            const snake = snakes[index];
            const head = snake.points[0];
            const dx = snake.dir.x;
            const dy = snake.dir.y;
            for (let step = 1; step < cols + rows; step++) {
                const cx = head.x + dx * step;
                const cy = head.y + dy * step;
                if (!isInside(cx, cy)) break;
                const blocker = occupancy[cy * cols + cx];
                if (blocker !== -1 && blocker !== index) deps[index].add(blocker);
            }
        }
        return deps;
    }

    function solveByDependencyElimination(snakes) {
        const deps = computeDependencies(snakes);
        const solved = [];
        const alive = new Set(snakes.map((_, index) => index));

        while (alive.size > 0) {
            let picked = -1;
            for (let index of alive) {
                let blocked = false;
                for (let dep of deps[index]) {
                    if (alive.has(dep)) {
                        blocked = true;
                        break;
                    }
                }
                if (!blocked) {
                    picked = index;
                    break;
                }
            }
            if (picked === -1) return { solvable: false, order: solved };
            solved.push(picked);
            alive.delete(picked);
        }

        return { solvable: true, order: solved };
    }

    function sample(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateReverseSolvedLayout() {
        const occupied = new Int16Array(cols * rows).fill(-1);
        const placed = [];
        const activeCells = [];
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (isInside(x, y)) activeCells.push({ x, y });
            }
        }

        const targetFillCells = Math.floor(activeCells.length * 1);
        const maxSnakeLength = Math.max(3, Math.floor(Math.min(cols, rows) * 0.24));
        let occupiedCount = 0;

        function isCellFree(x, y) {
            return isInside(x, y) && occupied[y * cols + x] === -1;
        }

        function rayClearToExit(head, dx, dy) {
            for (let step = 1; step < cols + rows; step++) {
                const cx = head.x + dx * step;
                const cy = head.y + dy * step;
                if (!isInside(cx, cy)) return true;
                if (occupied[cy * cols + cx] !== -1) return false;
            }
            return false;
        }

        function chooseBendDirection(prevDx, prevDy) {
            const turns = [];
            if (prevDx !== 0) {
                turns.push({ x: 0, y: 1 });
                turns.push({ x: 0, y: -1 });
            } else {
                turns.push({ x: 1, y: 0 });
                turns.push({ x: -1, y: 0 });
            }
            return turns;
        }

        function tryBuildSnake() {
            const head = sample(activeCells);
            if (!isCellFree(head.x, head.y)) return null;

            const dirs = [
                { x: 1, y: 0 },
                { x: -1, y: 0 },
                { x: 0, y: 1 },
                { x: 0, y: -1 }
            ].sort(() => Math.random() - 0.5);

            for (let dir of dirs) {
                if (!rayClearToExit(head, dir.x, dir.y)) continue;

                const neck = { x: head.x - dir.x, y: head.y - dir.y };
                if (!isCellFree(neck.x, neck.y)) continue;

                const path = [head, neck];
                const used = new Set([`${head.x},${head.y}`, `${neck.x},${neck.y}`]);

                let growDir = { x: -dir.x, y: -dir.y };
                let cursor = { x: neck.x, y: neck.y };
                const extra = 1 + Math.floor(Math.random() * maxSnakeLength);

                for (let step = 0; step < extra; step++) {
                    const shouldTurn = Math.random() < 0.35;
                    let candidates = shouldTurn
                        ? chooseBendDirection(growDir.x, growDir.y)
                        : [growDir, ...chooseBendDirection(growDir.x, growDir.y)];
                    candidates = candidates.sort(() => Math.random() - 0.5);

                    let moved = false;
                    for (let candidate of candidates) {
                        const nx = cursor.x + candidate.x;
                        const ny = cursor.y + candidate.y;
                        const key = `${nx},${ny}`;
                        if (!isCellFree(nx, ny) || used.has(key)) continue;
                        used.add(key);
                        path.push({ x: nx, y: ny });
                        cursor = { x: nx, y: ny };
                        growDir = candidate;
                        moved = true;
                        break;
                    }
                    if (!moved) break;
                }

                let selfBlocks = false;
                for (let step = 1; step < cols + rows; step++) {
                    const cx = head.x + dir.x * step;
                    const cy = head.y + dir.y * step;
                    if (!isInside(cx, cy)) break;
                    for (let index = 1; index < path.length; index++) {
                        if (path[index].x === cx && path[index].y === cy) {
                            selfBlocks = true;
                            break;
                        }
                    }
                    if (selfBlocks) break;
                }
                if (selfBlocks) continue;

                if (path.length < 3) continue;
                return path;
            }
            return null;
        }

        function buildStraightBackSnake(head, dir, targetLength) {
            const neck = { x: head.x - dir.x, y: head.y - dir.y };
            if (!isCellFree(neck.x, neck.y)) return null;

            const path = [head, neck];
            let cursor = { x: neck.x, y: neck.y };
            for (let step = 0; step < targetLength; step++) {
                const nx = cursor.x - dir.x;
                const ny = cursor.y - dir.y;
                if (!isCellFree(nx, ny)) break;
                path.push({ x: nx, y: ny });
                cursor = { x: nx, y: ny };
            }

            return path.length >= 3 ? path : null;
        }

        function findBestPlacementAtCell(cell) {
            const dirs = [
                { x: 1, y: 0 },
                { x: -1, y: 0 },
                { x: 0, y: 1 },
                { x: 0, y: -1 }
            ];

            let best = null;
            for (let dir of dirs) {
                if (!rayClearToExit(cell, dir.x, dir.y)) continue;

                for (let targetLength = 4; targetLength >= 1; targetLength--) {
                    const path = buildStraightBackSnake(cell, dir, targetLength);
                    if (!path) continue;
                    if (!best || path.length > best.length) best = path;
                }
            }

            return best;
        }

        function placePath(path) {
            const candidate = path.map(point => ({ x: point.x, y: point.y }));
            const snake = new Snake(candidate);
            placed.push(snake);
            const id = placed.length - 1;
            for (let point of candidate) {
                occupied[point.y * cols + point.x] = id;
            }
            occupiedCount += candidate.length;
        }

        function tryFillSingleCell(cell) {
            const best = findBestPlacementAtCell(cell);
            if (!best) return false;
            placePath(best);
            return true;
        }

        function extendTailOnce(snakeId) {
            const snake = placed[snakeId];
            if (!snake || snake.points.length < 3) return false;

            const tail = snake.points[snake.points.length - 1];
            const candidates = [
                { x: tail.x + 1, y: tail.y },
                { x: tail.x - 1, y: tail.y },
                { x: tail.x, y: tail.y + 1 },
                { x: tail.x, y: tail.y - 1 }
            ];

            let bestCell = null;
            let bestScore = 999;

            for (let next of candidates) {
                if (!isCellFree(next.x, next.y)) continue;

                let freeNeighbors = 0;
                const around = [
                    { x: next.x + 1, y: next.y },
                    { x: next.x - 1, y: next.y },
                    { x: next.x, y: next.y + 1 },
                    { x: next.x, y: next.y - 1 }
                ];
                for (let adj of around) {
                    if (isCellFree(adj.x, adj.y)) freeNeighbors++;
                }

                const score = freeNeighbors * 10 + Math.random();
                if (score < bestScore) {
                    bestScore = score;
                    bestCell = next;
                }
            }

            if (!bestCell) return false;

            snake.points.push({ x: bestCell.x, y: bestCell.y });
            occupied[bestCell.y * cols + bestCell.x] = snakeId;
            occupiedCount++;
            return true;
        }

        let idleAttempts = 0;
        while (occupiedCount < targetFillCells && idleAttempts < 2600) {
            const path = tryBuildSnake();
            if (!path) {
                idleAttempts++;
                continue;
            }

            placePath(path);
            idleAttempts = 0;
        }

        for (let pass = 0; pass < 8 && occupiedCount < targetFillCells; pass++) {
            const freeCells = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    if (isCellFree(x, y)) freeCells.push({ x, y });
                }
            }

            let madeProgress = false;
            freeCells.sort(() => Math.random() - 0.5);

            for (let cell of freeCells) {
                if (!isCellFree(cell.x, cell.y)) continue;
                if (tryFillSingleCell(cell)) madeProgress = true;
                if (occupiedCount >= targetFillCells) break;
            }

            if (!madeProgress) break;
        }

        let growthRounds = 0;
        while (occupiedCount < targetFillCells && growthRounds < activeCells.length * 2) {
            let grew = false;
            const order = Array.from({ length: placed.length }, (_, index) => index)
                .sort(() => Math.random() - 0.5);

            for (let snakeId of order) {
                if (extendTailOnce(snakeId)) grew = true;
                if (occupiedCount >= targetFillCells) break;
            }

            if (!grew) break;
            growthRounds++;
        }

        return placed;
    }

    function generateAsync(onComplete) {
        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('progressText').innerText = `Constructing guaranteed-solvable layout...`;

        setTimeout(() => {
            let bestLayout = [];
            let bestScore = -1;
            let totalActiveCells = 0;
            for (let value of maskGrid) if (value === 1) totalActiveCells++;

            for (let attempt = 0; attempt < 120; attempt++) {
                const candidate = generateReverseSolvedLayout();
                const solved = solveByDependencyElimination(candidate);
                if (!solved.solvable) continue;

                let occupiedCells = 0;
                for (let snake of candidate) occupiedCells += snake.points.length;
                const fillRatio = totalActiveCells > 0 ? occupiedCells / totalActiveCells : 0;

                const score = Math.floor(fillRatio * 10000) + candidate.length * 2 + occupiedCells;
                if (score > bestScore) {
                    bestScore = score;
                    bestLayout = candidate;
                }

                const progress = Math.floor(((attempt + 1) / 120) * 100);
                document.getElementById('progressBar').style.width = `${progress}%`;
                document.getElementById('progressText').innerText = `Searching dense candidate ${attempt + 1}/120`;
            }

            if (bestLayout.length === 0) {
                bestLayout = generateReverseSolvedLayout();
            }

            const finalSolve = solveByDependencyElimination(bestLayout);
            const maxLayer = computeDependencies(bestLayout)
                .reduce((max, set) => Math.max(max, set.size), 0);
            let usedCells = 0;
            for (let snake of bestLayout) usedCells += snake.points.length;
            const fillPct = totalActiveCells > 0 ? ((usedCells / totalActiveCells) * 100).toFixed(1) : '0.0';

            boardFillPct = fillPct;
            boardMaxBlockers = maxLayer;

            document.getElementById('loadingOverlay').style.display = 'none';
            onComplete(bestLayout);
            
        }, 50);
    }

    let dotsCanvas = null;
    function preRenderDots() {
        if (!dotsCanvas) dotsCanvas = document.createElement('canvas');
        dotsCanvas.width = canvas.width; dotsCanvas.height = canvas.height;
        const dctx = dotsCanvas.getContext('2d');
        dctx.fillStyle = activePalette.dots; 
        for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
            if (isInside(c, r)) {
                dctx.beginPath(); dctx.arc(c * cellSize + cellSize/2, r * cellSize + cellSize/2, 1, 0, Math.PI * 2); dctx.fill();
            }
        }
    }
    preRenderDots(); // Initialize immediately on startup

    function hasClearEscapeRay(snake, occupancy) {
        const head = snake.points[0];
        const dx = snake.dir.x;
        const dy = snake.dir.y;

        for (let step = 1; step < cols + rows; step++) {
            const cx = head.x + dx * step;
            const cy = head.y + dy * step;
            if (!isInside(cx, cy)) return true;
            if (occupancy[cy * cols + cx] !== -1) return false;
        }
        return false;
    }

    function hasAvailableMove() {
        const occupancy = new Int16Array(cols * rows).fill(-1);
        for (let index = 0; index < segments.length; index++) {
            for (let point of segments[index].points) {
                if (isInside(point.x, point.y)) {
                    occupancy[point.y * cols + point.x] = index;
                }
            }
        }

        for (let index = 0; index < segments.length; index++) {
            const snake = segments[index];
            if (snake.isMoving || snake.isRetracting) continue;
            if (hasClearEscapeRay(snake, occupancy)) return true;
        }
        return false;
    }

    function endRound(reason) {
        if (roundEnded) return;
        roundEnded = true;
        gameState = 'result';

        const remainingSeconds = gameMode === 'competitive' ? Math.max(0, Math.floor(timeLeftSeconds)) : 0;
        const solvedBonus = solvedCount * 120;
        const clearBonus = solvedCount === initialArrowCount ? 500 : 0;
        const mistakePenalty = mistakes * 35;
        const clickPenalty = Math.max(0, clickCount - solvedCount) * 8;
        const timeBonus = gameMode === 'competitive' ? remainingSeconds * 4 : 0;
        const modeMultiplier = gameMode === 'competitive' ? 1.25 : 1.0;

        const raw = solvedBonus + clearBonus + timeBonus - mistakePenalty - clickPenalty;
        const finalScore = Math.max(0, Math.round(raw * modeMultiplier));

        const reasonTextMap = {
            solved: 'All arrows escaped. Great run!',
            stuck: 'No more valid moves. Round ended.',
            timeout: 'Timer reached zero. Round ended.'
        };

        document.getElementById('finalTitle').textContent = reason === 'solved' ? 'Victory' : 'Game Over';
        document.getElementById('finalReason').textContent = reasonTextMap[reason] || 'Round complete.';
        document.getElementById('finalScore').textContent = String(finalScore);
        document.getElementById('finalBreakdown').textContent =
`mode: ${gameMode}
solved: ${solvedCount}/${initialArrowCount}
mistakes: ${mistakes}
extra clicks: ${Math.max(0, clickCount - solvedCount)}
time left: ${formatTime(remainingSeconds)}
board fill: ${boardFillPct}%
max blockers: ${boardMaxBlockers}`;

        showScreen(resultScreen);
    }


    function initGame() { 
        gameState = 'ingame';
        roundEnded = false;
        isWin = false;
        mistakes = 0;
        clickCount = 0;
        solvedCount = 0;
        initialArrowCount = 0;
        roundStartMs = performance.now();
        timeLeftSeconds = COMPETITIVE_SECONDS;
        updateHud();

        generateAsync(newSegments => {
            segments = newSegments && newSegments.length > 0 ? newSegments : [];
            initialArrowCount = segments.length;
            solvedCount = 0;
            updateHud();
        });
    }

    canvas.addEventListener('mousedown', e => {
        if (gameState !== 'ingame' || roundEnded) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) / (rect.width / cols), my = (e.clientY - rect.top) / (rect.height / rows);
        let found = null, bestDist = 0.8; 
        for(let s of segments) {
            if (s.isMoving || s.isRetracting) continue;
            const dist = Math.hypot(mx - (s.points[0].x + 0.5), my - (s.points[0].y + 0.5));
            if (dist < bestDist) { bestDist = dist; found = s; }
        }
        if (found) {
            clickCount++;
            found.startPoints = JSON.parse(JSON.stringify(found.points));
            found.isMoving = true;
            updateHud();
        }
    });

    function loop() {
        if (gameState === 'ingame' && !roundEnded && gameMode === 'competitive') {
            const elapsed = (performance.now() - roundStartMs) / 1000;
            timeLeftSeconds = Math.max(0, COMPETITIVE_SECONDS - elapsed);
            if (timeLeftSeconds <= 0) {
                endRound('timeout');
            }
            updateHud();
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Build Clipping Path from mask
        ctx.save();
        if (shapeMode !== 'square') {
            ctx.beginPath();
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    if (isInside(x, y)) {
                        ctx.rect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
            ctx.clip();
        }

        if (dotsCanvas) ctx.drawImage(dotsCanvas, 0, 0);
        segments.forEach(s => { s.update(); s.draw(); });

        if (gameState === 'ingame' && !roundEnded && segments.length > 0) {
            const anyAnimating = segments.some(s => s.isMoving || s.isRetracting);
            if (!anyAnimating && !hasAvailableMove()) {
                endRound('stuck');
            }
        }
        
        ctx.restore();

        requestAnimationFrame(loop);
    }

    buildShapeMask(); // Initial mask load
    applyThemeMode('system');
    updateHud();
    showStartMenu();
    loop();
</script>
</body>
